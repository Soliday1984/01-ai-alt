name: Cloudflare Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloudflare-build.yml"
      - "docs/cloudflare-migration.md"
      - "migrations/**"
      - "open-next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "wrangler.jsonc"
  pull_request:
    paths:
      - ".github/workflows/cloudflare-build.yml"
      - "docs/cloudflare-migration.md"
      - "migrations/**"
      - "open-next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "wrangler.jsonc"

concurrency:
  group: cloudflare-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SELF_SERVE_ENABLED: ${{ vars.SELF_SERVE_ENABLED }}
  NEXT_PUBLIC_LEAD_EMAIL: ${{ vars.NEXT_PUBLIC_LEAD_EMAIL }}
  NEXT_PUBLIC_PAYMENT_LINK: ${{ vars.NEXT_PUBLIC_PAYMENT_LINK }}
  NEXT_PUBLIC_SELF_SERVE_ENABLED: ${{ vars.NEXT_PUBLIC_SELF_SERVE_ENABLED }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

jobs:
  cloudflare-build:
    name: Build for Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Build Cloudflare Worker bundle
        run: pnpm cf:build
