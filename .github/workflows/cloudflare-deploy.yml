name: Cloudflare Deploy

on:
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-production
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_LEAD_EMAIL: ${{ vars.NEXT_PUBLIC_LEAD_EMAIL }}
  NEXT_PUBLIC_PAYMENT_LINK: ${{ vars.NEXT_PUBLIC_PAYMENT_LINK }}

jobs:
  deploy:
    name: Deploy ImageSEOFix Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Build Cloudflare Worker bundle
        run: pnpm cf:build

      - name: Validate Cloudflare deployment
        run: pnpm exec wrangler deploy --dry-run

      - name: Deploy to Cloudflare Workers
        id: deploy
        shell: bash
        run: |
          set -o pipefail
          pnpm exec wrangler deploy 2>&1 | tee deploy.log
          DEPLOYMENT_URL="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' deploy.log | tail -n 1)"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Could not find workers.dev URL in deployment output." >&2
            exit 1
          fi
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "## Cloudflare deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test deployed Worker
        shell: bash
        run: |
          set -euo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          curl -fsS "$URL/" > /dev/null
          curl -fsS "$URL/robots.txt" > /dev/null
          curl -fsS "$URL/sitemap.xml" > /dev/null
          API_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' "$URL/api/ping")"
          if [ "$API_STATUS" != "404" ]; then
            echo "Expected /api/ping to return 404, got $API_STATUS" >&2
            exit 1
          fi
          DOTENV_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' "$URL/.env")"
          if [ "$DOTENV_STATUS" != "404" ]; then
            echo "Expected /.env to return 404, got $DOTENV_STATUS" >&2
            exit 1
          fi
          SCANNER_STATUS="$(curl -sS -A 'sqlmap' -o /dev/null -w '%{http_code}' "$URL/")"
          if [ "$SCANNER_STATUS" != "403" ]; then
            echo "Expected scanner user-agent to return 403, got $SCANNER_STATUS" >&2
            exit 1
          fi
          SCAN_RESPONSE="$(curl -fsS \
            -H 'content-type: application/json' \
            -d '{"storeUrl":"https://allbirds.com"}' \
            "$URL/store-scan")"
          node -e "
            const data = JSON.parse(process.argv[1]);
            if (!data.scannedProducts || data.scannedProducts > 5) {
              throw new Error('Expected 1-5 scanned products');
            }
            if (!Array.isArray(data.rows) || data.rows.length === 0) {
              throw new Error('Expected real scan rows');
            }
          " "$SCAN_RESPONSE"
          EVENT_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H 'content-type: application/json' \
            -d '{"event":"smoke_test","payload":{"surface":"worker"}}' \
            "$URL/events")"
          if [ "$EVENT_STATUS" != "204" ]; then
            echo "Expected /events to return 204, got $EVENT_STATUS" >&2
            exit 1
          fi
          echo "- Smoke tests: passed" >> "$GITHUB_STEP_SUMMARY"
