name: Cloudflare Turnstile Setup

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Create widget and configure secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Turnstile widget and save keys
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN is missing." >&2
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is missing." >&2
            exit 1
          fi

          EXISTING_RESPONSE="$(curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/challenges/widgets" \
            --request GET \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json")"

          EXISTING_SITEKEY="$(node -e "
            const payload = JSON.parse(process.argv[1]);
            if (!payload.success) {
              console.error(JSON.stringify(payload.errors || payload, null, 2));
              process.exit(1);
            }
            const widgets = Array.isArray(payload.result) ? payload.result : [];
            const widget = widgets.find((item) => item.name === 'ImageSEOFix self-serve uploads');
            process.stdout.write(widget?.sitekey || widget?.site_key || '');
          " "$EXISTING_RESPONSE")"

          if [ -n "$EXISTING_SITEKEY" ]; then
            echo "A matching Turnstile widget already exists."
            echo "Sitekey: $EXISTING_SITEKEY"

            ROTATE_RESPONSE="$(curl -fsS \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/challenges/widgets/${EXISTING_SITEKEY}/rotate_secret" \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{}')"

            TURNSTILE_SECRET="$(node -e "
              const payload = JSON.parse(process.argv[1]);
              if (!payload.success) {
                console.error(JSON.stringify(payload.errors || payload, null, 2));
                process.exit(1);
              }
              const result = payload.result || {};
              const secret = result.secret || result.secret_key;
              if (!secret) {
                console.error('Turnstile API did not return a rotated secret key.');
                process.exit(1);
              }
              process.stdout.write(secret);
            " "$ROTATE_RESPONSE")"

            echo "::add-mask::$TURNSTILE_SECRET"
            printf '%s' "$TURNSTILE_SECRET" | pnpm exec wrangler secret put TURNSTILE_SECRET_KEY
            echo "TURNSTILE_SECRET_KEY rotated and saved to the Cloudflare Worker."
            exit 0
          fi

          CREATE_BODY="$(node -e "
            console.log(JSON.stringify({
              name: 'ImageSEOFix self-serve uploads',
              domains: ['imageseofix.com', 'www.imageseofix.com', 'localhost', '127.0.0.1'],
              mode: 'managed'
            }));
          ")"

          CREATE_RESPONSE="$(curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/challenges/widgets" \
            --request POST \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$CREATE_BODY")"

          SITEKEY="$(node -e "
            const payload = JSON.parse(process.argv[1]);
            if (!payload.success) {
              console.error(JSON.stringify(payload.errors || payload, null, 2));
              process.exit(1);
            }
            const result = payload.result || {};
            const sitekey = result.sitekey || result.site_key;
            if (!sitekey) {
              console.error('Turnstile API did not return a sitekey.');
              process.exit(1);
            }
            process.stdout.write(sitekey);
          " "$CREATE_RESPONSE")"

          TURNSTILE_SECRET="$(node -e "
            const payload = JSON.parse(process.argv[1]);
            const result = payload.result || {};
            const secret = result.secret || result.secret_key;
            if (!secret) {
              console.error('Turnstile API did not return a secret key.');
              process.exit(1);
            }
            process.stdout.write(secret);
          " "$CREATE_RESPONSE")"

          echo "::add-mask::$TURNSTILE_SECRET"
          echo "Created Turnstile widget."
          echo "Sitekey: $SITEKEY"

          printf '%s' "$TURNSTILE_SECRET" | pnpm exec wrangler secret put TURNSTILE_SECRET_KEY

          echo "TURNSTILE_SECRET_KEY saved to the Cloudflare Worker."

      - name: Confirm Worker secret exists
        run: pnpm exec wrangler secret list
